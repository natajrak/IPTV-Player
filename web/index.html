<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="./" />
  <title>BKL Play</title>
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png" />
  <link rel="manifest" href="images/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-bold-rounded/css/uicons-bold-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/3.0.0/uicons-solid-chubby/css/uicons-solid-chubby.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-chubby/css/uicons-regular-chubby.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header id="app-header">
    <img class="logo" src="images/logo/logo.png" alt="BKL Play" />
    <nav id="breadcrumb" aria-label="breadcrumb"></nav>
    <div id="search-container">
      <input type="text" id="search-input" placeholder="ค้นหา..." autocomplete="off" spellcheck="false" />
      <button id="search-clear" class="hidden" title="ล้างการค้นหา">✕</button>
      <div id="search-results" class="hidden"></div>
    </div>
  </header>

  <!-- Main content -->
  <main id="app-main">
    <div id="loading" class="center-screen">
      <div class="spinner"></div>
      <p>กำลังโหลด...</p>
    </div>
    <div id="error-view" class="center-screen hidden">
      <div class="error-icon">⚠️</div>
      <p id="error-message"></p>
    </div>
    <div id="grid-view" class="hidden"></div>
  </main>

  <!-- Video Player Overlay -->
  <div id="player-overlay" class="hidden">

    <!-- Top header (auto-hide) -->
    <div id="player-header">
      <button id="player-back" title="กลับ (Esc)">
        <i class="fi fi-br-arrow-small-left" aria-hidden="true"></i>
      </button>
      <span id="player-title"></span>
    </div>

    <!-- Video -->
    <video id="player-video" autoplay></video>
    <div id="player-loading" class="player-loading">
      <div class="player-spinner"></div>
    </div>
    <div id="player-notice" class="hidden" role="status" aria-live="polite"></div>

    <!-- Episode picker panel -->
    <div id="ep-panel" class="hidden">
      <div id="ep-panel-header">
        <span id="ep-panel-title">เลือกตอน</span>
        <button id="ep-panel-close"><i class="fi fi-sr-cross"></i></button>
      </div>
      <div id="ep-panel-tabs" class="hidden"></div>
      <div id="ep-panel-grid"></div>
    </div>

    <!-- Bottom control bar (auto-hide) -->
    <div id="player-bar">
      <!-- Progress -->
      <div id="player-progress-row">
        <input type="range" id="player-seek" min="0" max="100" step="0.01" value="0" />
        <div id="seek-preview" class="hidden">
          <div id="seek-preview-thumb"></div>
          <span id="seek-preview-time"></span>
        </div>
      </div>
      <!-- Buttons -->
      <div id="player-btn-row">
        <div class="bar-group">
          <button id="btn-prev-ep" title="ตอนก่อนหน้า"><i class="fi fi-sc-step-backward" aria-hidden="true"></i></button>
          <button id="btn-rewind" title="ย้อน 10 วินาที"><i class="fi fi-sr-rewind" aria-hidden="true"></i></button>
          <button id="btn-playpause" title="เล่น/หยุด"><i class="fi fi-sr-play" aria-hidden="true"></i></button>
          <button id="btn-forward" title="ข้าม 10 วินาที"><i class="fi fi-sr-forward" aria-hidden="true"></i></button>
          <button id="btn-next-ep" title="ตอนถัดไป"><i class="fi fi-sc-step-forward" aria-hidden="true"></i></button>
          <span id="player-time">0:00 / 0:00</span>
        </div>
        <div class="bar-group">
          <button id="btn-shuffle" title="สุ่มเล่น" hidden><i class="fi fi-rr-shuffle" aria-hidden="true"></i></button>
          <button id="btn-episodes" title="เลือกตอน"><i class="fi fi-rr-list" aria-hidden="true"></i><span>EP</span></button>
          <button id="btn-mute" title="ปิด/เปิดเสียง"><i class="fi fi-rr-volume" aria-hidden="true"></i></button>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" title="ระดับเสียง" />
          <button id="btn-pip" title="Picture in Picture" hidden><i class="fi fi-rr-resize"></i></button>
          <button id="btn-airplay" title="AirPlay / Cast to TV" hidden><i class="fi fi-br-airplay"></i></button>
          <button id="btn-fullscreen" title="เต็มหน้าจอ"><i class="fi fi-sr-expand" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>

    <!-- Up Next toast -->
    <div id="upnext-toast" class="hidden">
      <div id="upnext-content">
        <img id="upnext-thumb" src="" alt="" />
        <div class="upnext-text">
          <small>เล่นถัดไปใน <span id="upnext-countdown">5</span> วินาที</small>
          <strong id="upnext-title"></strong>
        </div>
        <div class="upnext-buttons">
          <button id="upnext-play-now">เล่นเลย</button>
          <button id="upnext-cancel">ยกเลิก</button>
        </div>
      </div>
      <div id="upnext-bar"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="js/app.js?v=23"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.error("Service worker registration failed:", err);
        }
